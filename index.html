<!DOCTYPE html>
<html>
<head>
  <title>Pod Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="page">
    <div class="topbar">
      <button id="loginBtn">Sign in with Google</button>

      <div id="userBar" class="user-bar" style="display: none;">
        <span id="userText">Logged in as</span>
        <button id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <div class="box">
      <h2>Pod Tracker</h2>

      <div class="section">
        <div class="label">CURRENT</div>
        <div id="current" class="value current"></div>
      </div>

      <div class="section">
        <div class="label">NEXT</div>
        <div id="next" class="value next"></div>
      </div>

      <button id="changeBtn">I Changed My Pod</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
